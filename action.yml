name: "cc-deps-patrol"
description: "Auto-merge Dependabot PRs with configurable strategies (auto-merge / AI review + merge / AI review only) per semver level."
author: "daitasu"

branding:
  icon: "git-merge"
  color: "green"

inputs:
  patch-strategy:
    description: >
      Strategy for patch version updates.
      One of: auto-merge, review-and-merge, review-only, none.
    required: false
    default: "auto-merge"
  minor-strategy:
    description: >
      Strategy for minor version updates.
      One of: auto-merge, review-and-merge, review-only, none.
    required: false
    default: "review-and-merge"
  major-strategy:
    description: >
      Strategy for major version updates.
      One of: auto-merge, review-and-merge, review-only, none.
    required: false
    default: "review-only"
  github-token:
    description: "GitHub token for approve and merge operations (e.g. GitHub App token or PAT)."
    required: true
  anthropic-api-key:
    description: "Anthropic API key for Claude Code AI review. Required when using review-and-merge or review-only strategies."
    required: false
    default: ""
  claude-github-token:
    description: "GitHub token for Claude Code Action. Required when using review-and-merge or review-only strategies."
    required: false
    default: ""
  claude-model:
    description: "Claude model to use for AI review."
    required: false
    default: "sonnet"
  reviewer-login:
    description: >
      Bot login name whose review approval to check before merging (e.g. "my-claude-app[bot]").
      Used only with review-and-merge strategy. If empty, checks the latest review on the PR.
    required: false
    default: ""
  review-language:
    description: "Language for AI review comments (e.g. en, ja)."
    required: false
    default: "en"

outputs:
  strategy:
    description: "The strategy that was applied."
    value: ${{ steps.determine.outputs.strategy }}
  update-type:
    description: "The semver update level (patch, minor, major)."
    value: ${{ steps.determine.outputs.update-type }}

runs:
  using: "composite"
  steps:
    # ── 1. Fetch Dependabot metadata ──
    - name: Fetch Dependabot metadata
      id: fetch-metadata
      uses: dependabot/fetch-metadata@dbb049abf0d677abbd7f7eee0375145b417fdd34 # v2.3.0
      with:
        github-token: ${{ inputs.github-token }}

    # ── 2. Determine strategy ──
    - name: Determine strategy
      id: determine
      shell: bash
      run: ${{ github.action_path }}/scripts/determine-strategy.sh
      env:
        UPDATE_TYPE: ${{ steps.fetch-metadata.outputs.update-type }}
        PATCH_STRATEGY: ${{ inputs.patch-strategy }}
        MINOR_STRATEGY: ${{ inputs.minor-strategy }}
        MAJOR_STRATEGY: ${{ inputs.major-strategy }}

    # ── 3a. auto-merge: approve + merge immediately ──
    - name: "Auto-merge: approve & merge"
      if: steps.determine.outputs.strategy == 'auto-merge'
      shell: bash
      run: ${{ github.action_path }}/scripts/auto-merge.sh
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_URL: ${{ github.event.pull_request.html_url }}

    # ── 3b. review-and-merge: AI review with approve permission ──
    - name: "AI Review (review-and-merge)"
      if: steps.determine.outputs.strategy == 'review-and-merge'
      uses: anthropics/claude-code-action@d59651bd82c48d81756854675ce4fa4d69722200 # v1
      with:
        allowed_bots: "dependabot"
        anthropic_api_key: ${{ inputs.anthropic-api-key }}
        github_token: ${{ inputs.claude-github-token }}
        claude_args: >-
          --model ${{ inputs.claude-model }}
          --allowedTools
          "Bash(gh pr review ${{ github.event.pull_request.number }} --approve:*),Bash(gh pr comment ${{ github.event.pull_request.number }} -b:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          --max-turns 50
        prompt: |
          Review this Dependabot PR (minor update).

          ## Review criteria
          - Check if CHANGELOG / release notes contain any breaking changes
          - Check for dependency version constraint conflicts
          - Verify that lockfile changes are valid

          ## Steps
          1. Run `gh pr diff ${{ github.event.pull_request.number }}` to review the diff
          2. Run `gh pr view ${{ github.event.pull_request.number }}` to check the PR summary
          3. If no issues found, run `gh pr review ${{ github.event.pull_request.number }} --approve` to approve
          4. If there are concerns, do NOT approve — leave a comment with `gh pr comment` instead

          Write all comments in: ${{ inputs.review-language }}
        timeout_minutes: 10

    - name: "Conditional merge after AI review"
      if: steps.determine.outputs.strategy == 'review-and-merge'
      shell: bash
      run: ${{ github.action_path }}/scripts/conditional-merge.sh
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_URL: ${{ github.event.pull_request.html_url }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REVIEWER_LOGIN: ${{ inputs.reviewer-login }}

    # ── 3c. review-only: AI review comment only (no merge) ──
    - name: "AI Review (review-only)"
      if: steps.determine.outputs.strategy == 'review-only'
      uses: anthropics/claude-code-action@d59651bd82c48d81756854675ce4fa4d69722200 # v1
      with:
        allowed_bots: "dependabot"
        anthropic_api_key: ${{ inputs.anthropic-api-key }}
        github_token: ${{ inputs.claude-github-token }}
        claude_args: >-
          --model ${{ inputs.claude-model }}
          --allowedTools
          "Bash(gh pr comment ${{ github.event.pull_request.number }} -b:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          --max-turns 50
        prompt: |
          Review this Dependabot PR (major update or similar).

          ## Steps (follow this order)
          1. Run `gh pr diff ${{ github.event.pull_request.number }}` to fetch and review the diff
          2. Run `gh pr view ${{ github.event.pull_request.number }}` to check the PR summary
          3. Review with the following criteria:
             - Breaking changes in CHANGELOG / release notes
             - Dependency version constraint conflicts
             - Incompatible API changes
             - Availability of migration guides
          4. Post review results with `gh pr comment ${{ github.event.pull_request.number }} -b "..."`

          ## Important
          - This PR will NOT be auto-merged
          - Do NOT approve or request changes
          - You MUST post a review comment via `gh pr comment` before finishing

          Write all comments in: ${{ inputs.review-language }}
        timeout_minutes: 10
